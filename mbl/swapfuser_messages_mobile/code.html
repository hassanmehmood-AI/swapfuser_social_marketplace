<script>
(function(){
  var P = {
    feed:    '../swapfuser_social_feed_mobile/code.html',
    map:     '../swapfuser_map_mobile/code.html',
    profile: '../swapfuser_profile_mobile/code.html'
  };
  function navLabel(el){
    var s = el.querySelector('.font-label-caps');
    return s ? s.textContent.trim().toLowerCase() : '';
  }
  // Wire bottom nav (first nav element, outside chat screen)
  var firstNav = document.querySelector('nav.fixed.bottom-0');
  if(firstNav){
    firstNav.querySelectorAll('button').forEach(function(btn){
      var l = navLabel(btn);
      if(l==='feed')    btn.addEventListener('click',function(){ location.href=P.feed; });
      else if(l==='map')     btn.addEventListener('click',function(){ location.href=P.map; });
      else if(l==='profile') btn.addEventListener('click',function(){ location.href=P.profile; });
    });
  }
})();
</script>
