<style>

        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #f7f9fb; /* surface */

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-on-surface antialiased w-full max-w-md mx-auto relative bg-surface-bright min-h-screen flex flex-col">
<!-- Sticky Header (Modal Style for Task-Focused Flow) -->
<header class="sticky top-0 z-50 bg-surface/90 backdrop-blur-xl h-16 flex justify-between items-center px-margin-mobile border-b border-outline-variant/20">
<button class="p-2 -ml-2 text-on-surface hover:bg-surface-variant/50 rounded-full transition-colors active:scale-95 flex items-center justify-center" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<h1 class="font-headline-md-mobile text-headline-md-mobile text-on-surface">New Post</h1>
<button class="text-primary font-username-sm text-username-sm active:scale-95 transition-transform px-2" type="button">
            Share
        </button>
</header>
<!-- Main Form Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-6 flex flex-col gap-6">
<!-- Intent Toggle -->
<div class="flex p-1 bg-surface-container rounded-full w-full relative">
<div class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-primary rounded-full shadow-sm transition-transform duration-300 ease-in-out" id="toggle-indicator"></div>
<button class="relative z-10 flex-1 py-2.5 rounded-full text-on-primary font-username-sm text-username-sm text-center transition-colors" id="btn-sell" onclick="setToggle('sell')" type="button">
                Sell
            </button>
<button class="relative z-10 flex-1 py-2.5 rounded-full text-on-surface-variant font-username-sm text-username-sm text-center transition-colors" id="btn-swap" onclick="setToggle('swap')" type="button">
                Swap
            </button>
</div>
<!-- Image Upload Area -->
<button class="w-full aspect-[4/3] bg-surface-container-low border-2 border-dashed border-outline-variant/60 rounded-xl flex flex-col items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-container transition-colors active:scale-[0.99]" type="button">
<div class="w-12 h-12 rounded-full bg-surface-variant/50 flex items-center justify-center mb-1">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">add_a_photo</span>
</div>
<span class="font-username-sm text-username-sm">Upload Photos</span>
<span class="font-body-sm text-body-sm text-outline">Up to 10 images</span>
</button>
<!-- Form Fields -->
<div class="flex flex-col gap-5">
<!-- Title -->
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="item-title">Item Title</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg p-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" id="item-title" placeholder="What are you offering?" type="text"/>
</div>
<!-- Price (Conditional appearance based on toggle) -->
<div class="flex flex-col gap-1.5 transition-all duration-300" id="price-container">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="item-price">Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 font-body-md text-body-md text-on-surface-variant">$</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg p-4 pl-8 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" id="item-price" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Description -->
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="item-desc">Description</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg p-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm resize-none" id="item-desc" placeholder="Describe the condition, features, and reason for selling/swapping..." rows="4"></textarea>
</div>
<!-- Location -->
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider" for="item-location">Location</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-outline material-symbols-outlined pointer-events-none">location_on</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant/40 rounded-lg p-4 pl-12 font-body-md text-body-md text-on-surface placeholder:text-outline focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all shadow-sm" id="item-location" placeholder="Neighborhood or Zip Code" type="text"/>
<button class="absolute right-3 p-1 text-primary hover:bg-primary-fixed/50 rounded-full transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined text-[20px]">my_location</span>
</button>
</div>
</div>
</div>
<!-- Extra Bottom Padding for mobile safety -->
<div class="h-8"></div>
</main>
<script>
        function setToggle(mode) {
            const indicator = document.getElementById('toggle-indicator');
            const btnSell = document.getElementById('btn-sell');
            const btnSwap = document.getElementById('btn-swap');
            const priceContainer = document.getElementById('price-container');

            if (mode === 'sell') {
                indicator.style.transform = 'translateX(0)';
                btnSell.classList.add('text-on-primary');
                btnSell.classList.remove('text-on-surface-variant');
                btnSwap.classList.add('text-on-surface-variant');
                btnSwap.classList.remove('text-on-primary');
                
                // Show price
                priceContainer.style.opacity = '1';
                priceContainer.style.height = 'auto';
                priceContainer.style.overflow = 'visible';
                priceContainer.style.marginTop = '0';
            } else {
                indicator.style.transform = 'translateX(100%)';
                btnSwap.classList.add('text-on-primary');
                btnSwap.classList.remove('text-on-surface-variant');
                btnSell.classList.add('text-on-surface-variant');
                btnSell.classList.remove('text-on-primary');
                
                // Dim/Hide price for purely swap
                priceContainer.style.opacity = '0.4';
                // In a real app we might completely hide it or change label to "Estimated Value"
            }
        }
    </script>
<script>
(function(){
  var P = {
    feed: '../swapfuser_social_feed_mobile/code.html'
  };
  // Close button (X) → back to feed
  document.querySelectorAll('button').forEach(function(btn){
    if(btn.querySelector('.material-symbols-outlined') &&
       btn.querySelector('.material-symbols-outlined').textContent.trim()==='close'){
      btn.addEventListener('click',function(){ location.href=P.feed; });
    }
  });
})();
</script>
</body></html>
