<script>
(function(){
  var P = {
    feed:    '../swapfuser_social_feed/code.html',
    profile: '../swapfuser_user_profile/code.html',
    messages:'../swapfuser_messages_updated/code.html',
    create:  '../swapfuser_create_post/code.html'
  };
  function navLabel(el){
    var s = el.querySelector('.font-username-sm,.font-label-caps,span:not(.material-symbols-outlined)');
    return s ? s.textContent.trim().toLowerCase() : el.textContent.trim().toLowerCase();
  }
  document.querySelectorAll('a[href="#"]').forEach(function(a){
    var l = navLabel(a);
    if(l==='feed')      a.href = P.feed;
    else if(l==='profile') a.href = P.profile;
  });
  document.querySelectorAll('button').forEach(function(btn){
    var t = btn.textContent.trim();
    if(t==='Create Post') btn.addEventListener('click',function(){ location.href=P.create; });
  });
})();
</script>
